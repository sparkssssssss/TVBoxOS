name: Build APK

# 触发方式：仅手动触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取当前仓库代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 JDK 17（AGP 7.2.2 + Gradle 7.5 可用 17）
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. 配置 Gradle（带缓存，加速后续构建）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. 注入签名配置（复用仓库自带的 TVBoxOSC.jks，密码统一为 TVBoxOSC）
      #    用 base64 编码避免 sed 多行插入的续行问题（每行末尾带 \ 续行）
      - name: Inject Signing Config
        run: |
          signingConfigs=''
          signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyBzaWduaW5nQ29uZmlncy5teUNvbmZpZ1wKICAgICAgICAgICAgfVwK'
          signingConfigs="$(echo "$signingConfigs" |base64 -d )"
          signingConfig="$(echo "$signingConfig" |base64 -d )"
          sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
          cp -f .github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
          {
            echo "RELEASE_STORE_FILE=./TVBoxOSC.jks"
            echo "RELEASE_KEY_ALIAS=TVBoxOSC"
            echo "RELEASE_STORE_PASSWORD=TVBoxOSC"
            echo "RELEASE_KEY_PASSWORD=TVBoxOSC"
          } >> gradle.properties
          sed -i 's/^#\(org.gradle.jvmargs=.*\)/\1/' gradle.properties
          # 打印前 40 行确认签名块已插入
          head -40 app/build.gradle

      # 5. 只编译 python32 release APK
      - name: Build python32 Release APK
        run: |
          chmod +x gradlew
          ./gradlew assemblePython32Release --build-cache --parallel --daemon

      # 6. 收集 APK 并重命名
      - name: Collect & Rename APK
        run: |
          mkdir -p apk/
          TAG=$(git log --date=format:'%Y%m%d-%H%M' --pretty=format:%cd -1)
          SHORT=$(git rev-parse --short HEAD)
          cp app/build/outputs/apk/python32/release/*.apk "apk/TVBox_python32_${TAG}_${SHORT}.apk"
          ls -lh apk/

      # 7. 上传为 Artifact（从 Actions 页面下载）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-python32-${{ github.run_number }}
          path: apk/*.apk
          retention-days: 30
